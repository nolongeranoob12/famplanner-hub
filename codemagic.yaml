workflows:
  ios-workflow:
    name: iOS Workflow
    max_build_duration: 120
    environment:
      node: 22.11.0
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: "com.nolongeranoob12.famplannerhub"
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.nolongeranoob12.famplannerhub
    integrations:
      app_store_connect: Codemagic IOS Build
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build web app
        script: npm run build
      - name: Install Capacitor
        script: |
          npm install @capacitor/core @capacitor/cli @capacitor/ios
          npx cap init "Family Connect Hub" "com.nolongeranoob12.famplannerhub" --web-dir=dist
          npx cap add ios
          npx cap sync ios
          ls -la
          ls -la ios/ || echo "ios folder not found"
          ls -la ios/App/ || echo "ios/App folder not found"
      - name: Install CocoaPods
        script: |
          cd ios/App
          pod init
          pod install
      - name: Build iOS
        script: |
          xcode-project use-profiles
          xcode-project build-ipa \
            --workspace ios/App/App.xcworkspace \
            --scheme App
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
