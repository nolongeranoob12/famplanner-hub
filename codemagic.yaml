workflows:
  ios-workflow:
    name: iOS Workflow
    max_build_duration: 120
    environment:
      node: 22.11.0
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: "com.nolongeranoob12.famplannerhub"
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.nolongeranoob12.famplannerhub
    integrations:
      app_store_connect: Codemagic IOS Build
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build web app
        script: npm run build
      - name: Install Capacitor
        script: |
          npm install @capacitor/core @capacitor/cli @capacitor/ios
          npm install @capacitor/push-notifications
          npx cap init "Family Connect Hub" "com.nolongeranoob12.famplannerhub" --web-dir=dist
          npx cap add ios
          npx cap sync ios
          sed -i '' 's/app.lovable.chaufamily/com.nolongeranoob12.famplannerhub/g' ios/App/App.xcodeproj/project.pbxproj
          sed -i '' 's/app.lovable.chaufamily/com.nolongeranoob12.famplannerhub/g' ios/App/App/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion 8" ios/App/App/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString 1.0.4" ios/App/App/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleDisplayName Family Connect Hub" ios/App/App/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleName Family Connect Hub" ios/App/App/Info.plist
          /usr/libexec/PlistBuddy -c "Add :NSCameraUsageDescription string 'This app needs camera access to submit family photos'" ios/App/App/Info.plist
          /usr/libexec/PlistBuddy -c "Add :NSPhotoLibraryUsageDescription string 'This app needs photo library access to submit family photos'" ios/App/App/Info.plist
          /usr/libexec/PlistBuddy -c "Add :NSPhotoLibraryAddUsageDescription string 'This app needs photo library access to save family photos'" ios/App/App/Info.plist
          /usr/libexec/PlistBuddy -c "Add :UIBackgroundModes array" ios/App/App/Info.plist
          /usr/libexec/PlistBuddy -c "Add :UIBackgroundModes:0 string remote-notification" ios/App/App/Info.plist
      - name: Install App Icon
        script: |
          mkdir -p ios/App/App/Assets.xcassets/AppIcon.appiconset
          cp ios-assets/AppIcon-1024.png ios/App/App/Assets.xcassets/AppIcon.appiconset/AppIcon-1024.png
          cp ios-assets/Contents.json ios/App/App/Assets.xcassets/AppIcon.appiconset/Contents.json
      - name: Create Entitlements
        script: |
          cat > ios/App/App/App.entitlements << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>aps-environment</key>
            <string>production</string>
          </dict>
          </plist>
          EOF
          /usr/bin/plutil -replace com.apple.developer.aps-environment -string production ios/App/App/App.entitlements
          sed -i '' 's/CODE_SIGN_ENTITLEMENTS = /CODE_SIGN_ENTITLEMENTS = App\/App.entitlements; \/\/ /g' ios/App/App.xcodeproj/project.pbxproj
      - name: Install CocoaPods
        script: |
          cd ios/App
          pod init
          pod install
      - name: Build iOS
        script: |
          xcode-project use-profiles
          xcode-project build-ipa \
            --workspace ios/App/App.xcworkspace \
            --scheme App
          mv "build/ios/ipa/Family Connect Hub.ipa" "build/ios/ipa/FamilyConnectHub.ipa" || true
    artifacts:
      - build/ios/ipa/FamilyConnectHub.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
