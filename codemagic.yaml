workflows:
  ios-workflow:
    name: iOS Workflow
    max_build_duration: 120
    environment:
      node: 22.11.0
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: "com.nolongeranoob12.famplannerhub"
        BUILD_NUMBER: $(($(app-store-connect get-latest-build-number "com.nolongeranoob12.famplannerhub") + 1))
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.nolongeranoob12.famplannerhub
    integrations:
      app_store_connect: Codemagic IOS Build
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build web app
        script: npm run build
      - name: Install Capacitor
        script: |
          npm install @capacitor/core @capacitor/cli @capacitor/ios
          npx cap init "Family Connect Hub" "com.nolongeranoob12.famplannerhub" --web-dir=dist
          npx cap add ios
          npx cap sync ios
          # Bundle ID is now set directly in capacitor.config.ts — no sed substitution needed.
          cat ios/App/App/Info.plist | grep BundleIdentifier
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion 3" ios/App/App/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString 1.0.1" ios/App/App/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleDisplayName 'Family Connect Hub'" ios/App/App/Info.plist || \
            /usr/libexec/PlistBuddy -c "Add :CFBundleDisplayName string 'Family Connect Hub'" ios/App/App/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleName 'Family Connect Hub'" ios/App/App/Info.plist || \
            /usr/libexec/PlistBuddy -c "Add :CFBundleName string 'Family Connect Hub'" ios/App/App/Info.plist
          # Required iOS privacy permissions — iPad crashes (TCC SIGABRT) when tapping a file input without these.
          # Strategy: Delete the key first (ignore error if missing), then Add. This guarantees the final value is set.
          PLIST="ios/App/App/Info.plist"
          set_plist_string() {
            local key="$1"; local value="$2"
            /usr/libexec/PlistBuddy -c "Delete :$key" "$PLIST" 2>/dev/null || true
            /usr/libexec/PlistBuddy -c "Add :$key string $value" "$PLIST"
          }
          set_plist_string "NSCameraUsageDescription"        "This app needs access to the camera to attach photos to family activities."
          set_plist_string "NSPhotoLibraryUsageDescription"  "This app needs access to your photo library to attach photos to family activities."
          set_plist_string "NSPhotoLibraryAddUsageDescription" "This app needs permission to save photos to your photo library."
          # Verify the keys were written — fail the build loudly if any are missing.
          echo "── Verifying privacy keys in Info.plist ──"
          /usr/libexec/PlistBuddy -c "Print :NSCameraUsageDescription"        "$PLIST" || { echo "❌ NSCameraUsageDescription missing"; exit 1; }
          /usr/libexec/PlistBuddy -c "Print :NSPhotoLibraryUsageDescription"  "$PLIST" || { echo "❌ NSPhotoLibraryUsageDescription missing"; exit 1; }
          /usr/libexec/PlistBuddy -c "Print :NSPhotoLibraryAddUsageDescription" "$PLIST" || { echo "❌ NSPhotoLibraryAddUsageDescription missing"; exit 1; }
          echo "✅ All privacy keys present"
      - name: Install App Icon
        script: |
          ICON_DIR="ios/App/App/Assets.xcassets/AppIcon.appiconset"
          mkdir -p "$ICON_DIR"
          cp ios-assets/AppIcon-1024.png "$ICON_DIR/AppIcon-1024.png"
          cp ios-assets/Contents.json "$ICON_DIR/Contents.json"
          ls -la "$ICON_DIR"
      - name: Install CocoaPods
        script: |
          cd ios/App
          pod init
          pod install
      - name: Build iOS
        script: |
          xcode-project use-profiles
          xcode-project build-ipa \
            --workspace ios/App/App.xcworkspace \
            --scheme App \
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
