workflows:
  ios-workflow:
    name: iOS Workflow
    max_build_duration: 120
    environment:
      node: 22.11.0
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: "com.nolongeranoob12.famplannerhub"
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.nolongeranoob12.famplannerhub
    integrations:
      app_store_connect: Codemagic IOS Build
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build web app
        script: npm run build
      - name: Install Capacitor
        script: |
          npm install @capacitor/core @capacitor/cli @capacitor/ios
          npm install @capacitor/push-notifications
          npx cap add ios
          npx cap sync ios
          sed -i '' 's/app.lovable.chaufamily/com.no
