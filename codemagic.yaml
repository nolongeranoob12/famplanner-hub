workflows:
  ios-workflow:
    name: iOS Workflow
    max_build_duration: 120
    environment:
      node: 22.11.0
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: "com.nolongeranoob12.famplannerhub"
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.nolongeranoob12.famplannerhub
    integrations:
      app_store_connect: Codemagic IOS Build
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build web app
        script: npm run build
      - name: Install Capacitor
        script: |
          npm install @capacitor/core @capacitor/cli @capacitor/ios
          npx cap init "Family Connect Hub" "com.nolongeranoob12.famplannerhub" --web-dir=dist
          npx cap add ios
          npx cap sync ios
          ls -la
          ls -la ios/ || echo "ios folder not found"
          ls -la ios/App/ || echo "ios/App folder not found"
      - name: Install CocoaPods
        script: |
          cd ios/App
          pod init
          pod install
      - name: Create export options
        script: |
          cat > $CM_BUILD_DIR/export_options.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>53G9S6C954</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.nolongeranoob12.famplannerhub</key>
              <string>FamPlanner AppStore Profile</string>
            </dict>
          </dict>
          </plist>
          EOF
      - name: Build iOS
        script: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath $CM_BUILD_DIR/App.xcarchive \
            archive \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=53G9S6C954 \
            PRODUCT_BUNDLE_IDENTIFIER=com.nolongeranoob12.famplannerhub \
            PROVISIONING_PROFILE_SPECIFIER="FamPlanner AppStore Profile" \
            CODE_SIGN_IDENTITY="Apple Distribution"
          xcodebuild -exportArchive \
            -archivePath $CM_BUILD_DIR/App.xcarchive \
            -exportPath $CM_BUILD_DIR/ipa \
            -exportOptionsPlist $CM_BUILD_DIR/export_options.plist || true
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
