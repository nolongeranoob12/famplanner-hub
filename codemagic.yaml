workflows:
  ios-workflow:
    name: iOS Workflow
    max_build_duration: 120
    environment:
      node: 22.11.0
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: "com.nolongeranoob12.famplannerhub"
        BUILD_NUMBER: $(($(app-store-connect get-latest-build-number "com.nolongeranoob12.famplannerhub") + 1))
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.nolongeranoob12.famplannerhub
    integrations:
      app_store_connect: Codemagic IOS Build
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build web app
        script: npm run build
      - name: Install Capacitor
        script: |
          npm install @capacitor/core @capacitor/cli @capacitor/ios
          npx cap init "Family Connect Hub" "com.nolongeranoob12.famplannerhub" --web-dir=dist
          npx cap add ios
          npx cap sync ios
          sed -i '' 's/app.lovable.chaufamily/com.nolongeranoob12.famplannerhub/g' ios/App/App.xcodeproj/project.pbxproj
          sed -i '' 's/app.lovable.chaufamily/com.nolongeranoob12.famplannerhub/g' ios/App/App/Info.plist
          cat ios/App/App/Info.plist | grep BundleIdentifier
      - name: Install CocoaPods
        script: |
          cd ios/App
          pod init
          pod install
      - name: Build iOS
        script: |
          xcode-project use-profiles
          xcode-project build-ipa \
            --workspace ios/App/App.xcworkspace \
            --scheme App \
            --build-number $BUILD_NUMBER
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
